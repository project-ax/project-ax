apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ax.fullname" . }}-host
  namespace: {{ include "ax.namespace" . }}
  labels:
    {{- include "ax.componentLabels" (dict "component" "host" "context" $) | nindent 4 }}
    ax.io/plane: ingress
spec:
  replicas: {{ include "ax.preset.hostReplicas" . }}
  selector:
    matchLabels:
      {{- include "ax.selectorLabels" (dict "component" "host" "context" $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ax.selectorLabels" (dict "component" "host" "context" $) | nindent 8 }}
        ax.io/plane: ingress
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-ax-config.yaml") . | sha256sum }}
    spec:
      containers:
        - name: host
          image: {{ include "ax.image" (dict "image" .Values.host.image "imageDefaults" .Values.imageDefaults "context" $) }}
          command: {{ .Values.host.command | toJson }}
          ports:
            - name: http
              containerPort: {{ .Values.host.ports.http }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.host.ports.metrics }}
              protocol: TCP
          env:
            - name: AX_CONFIG_PATH
              value: "/etc/ax/ax.yaml"
            - name: BIND_HOST
              value: "0.0.0.0"
            - name: PORT
              value: {{ .Values.host.ports.http | quote }}
            - name: NATS_URL
              value: {{ include "ax.natsUrl" . | quote }}
            - name: K8S_RUNTIME_CLASS
              value: {{ include "ax.preset.sandboxRuntimeClass" . | quote }}
            {{- include "ax.databaseEnv" . | nindent 12 }}
            {{- range $envVar, $secretKey := .Values.apiCredentials.envVars }}
            {{- if $secretKey }}
            - name: {{ $envVar }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.apiCredentials.existingSecret }}
                  key: {{ $secretKey }}
                  optional: true
            {{- end }}
            {{- end }}
            {{- with .Values.host.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- include "ax.preset.hostResources" . | nindent 12 }}
          {{- with .Values.host.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.host.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: ax-config
              mountPath: /etc/ax
              readOnly: true
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.host.terminationGracePeriodSeconds }}
      volumes:
        - name: ax-config
          configMap:
            name: {{ include "ax.fullname" . }}-config
