# Cloud SQL Auth Proxy — provides secure, IAM-authenticated access to Cloud SQL.
#
# Runs as a shared service rather than a sidecar, so multiple pods can share
# one proxy instance. Autopilot-friendly (no privileged access needed).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-sql-proxy
  namespace: ax
  labels:
    app.kubernetes.io/name: cloud-sql-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cloud-sql-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloud-sql-proxy
    spec:
      serviceAccountName: cloud-sql-proxy
      containers:
        - name: proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
          args:
            # Replace with your Cloud SQL instance connection name
            - "--structured-logs"
            - "--auto-iam-authn"
            - "--address=0.0.0.0"
            - "--port=5432"
            - "PROJECT:REGION:INSTANCE"  # Replace with actual instance
          ports:
            - name: postgres
              containerPort: 5432
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 5
            periodSeconds: 10

---

apiVersion: v1
kind: Service
metadata:
  name: cloud-sql-proxy
  namespace: ax
  labels:
    app.kubernetes.io/name: cloud-sql-proxy
spec:
  selector:
    app.kubernetes.io/name: cloud-sql-proxy
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloud-sql-proxy
  namespace: ax
  annotations:
    # Workload Identity: bind to GCP service account with Cloud SQL Client role
    iam.gke.io/gcp-service-account: "ax-cloudsql@PROJECT.iam.gserviceaccount.com"  # Replace
